<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修德 60 周年校慶闖關</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .completed { background-color: #10b981 !important; color: white !important; border-color: #059669 !important; }
        .failed { background-color: #ef4444 !important; color: white !important; border-color: #dc2626 !important; }
        .reward-active { color: #d97706 !important; font-weight: 800; transform: scale(1.05); }
        /* 鎖定禁止點擊的手勢 */
        .no-click { pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans select-none">

    <div id="login-view" class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-2xl mt-10 border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-900">修德 60 周年</h1>
            <p class="text-gray-500 mt-2 font-medium">校慶闖關系統</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">班級</label>
                <input type="text" id="class-input" placeholder="例如：601" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-indigo-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">座號</label>
                <input type="text" id="no-input" placeholder="例如：05" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-indigo-500 outline-none transition-all">
            </div>
            <button id="login-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-200 transition-all active:scale-95 mt-4">
                開始闖關之旅
            </button>
        </div>
    </div>

    <div id="game-view" class="hidden max-w-2xl mx-auto">
        <div class="bg-white p-6 rounded-3xl shadow-xl mb-6 text-center relative border border-gray-50">
            <h2 id="user-display" class="font-black text-xl text-indigo-900 mb-3"></h2>
            
            <div class="flex justify-around items-center bg-indigo-50/50 p-4 rounded-2xl mb-4 border border-indigo-100">
                <div id="reward-3" class="text-gray-400 text-xs flex flex-col items-center">
                    <span class="text-xl mb-1">🥉</span><span>3關小獎</span>
                </div>
                <div id="reward-7" class="text-gray-400 text-xs flex flex-col items-center">
                    <span class="text-xl mb-1">🥈</span><span>7關中級獎</span>
                </div>
                <div id="reward-11" class="text-gray-400 text-xs flex flex-col items-center">
                    <span class="text-xl mb-1">🏆</span><span>11關大獎</span>
                </div>
            </div>

            <div class="flex justify-between items-end px-2">
                <p id="progress" class="text-indigo-600 font-black text-lg">完成進度 0 / 11</p>
                <button onclick="logout()" class="text-xs text-gray-400 hover:text-red-500 underline decoration-dotted">重設進度</button>
            </div>
        </div>

        <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3"></div>
        
        <p class="text-center text-gray-400 text-[11px] mt-8 font-medium italic">
            提示：本系統採實地闖關制，請至各站點掃描 QR Code 開啟題目
        </p>
    </div>

    <div id="quiz-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-lg shadow-2xl border border-white">
            <div id="quiz-header" class="mb-6"></div>
            <div id="options" class="space-y-3"></div>
            <button onclick="closeModal()" class="mt-8 w-full text-gray-400 text-sm font-bold tracking-widest hover:text-indigo-600 transition-colors">
                暫時離開
            </button>
        </div>
    </div>

    <script>
        const STAGE_DATA = {
            1: { name: "藝海尋蹤・樓層大解密", q: "歡迎來到修德藝術殿堂！請觀察一下，這間位於龍鳳樓五樓的美術教室，真正的名稱是什麼呢？", a: ["(A) 龍飛鳳舞", "(B) 修德 Art Center"], ans: 1 },
            2: { name: "藝想天開・策展小達人", q: "進入展區欣賞精美作品時，別忘了抬頭看看門口或牆上的大海報，請問今年美術班展覽的主題名稱是？", a: ["(A) 時空藝象", "(B) 藝於常人"], ans: 0 },
            3: { name: "繽紛甲子・校園調色盤", q: "修德慶祝 60 周年啦！請環顧一下校園四周的慶典布置，這六十周年的主色系是由哪四色構成的呢？", a: ["(A) 紅、黃、藍、綠", "(B) 灰、黑、白、粉"], ans: 0 },
            4: { name: "How old is Xiude?", q: "今年是修德實施雙語教學的第幾年呢?", a: ["(A) 第6年", "(B) 第16年"], ans: 0 },
            5: { name: "I love Bilingual!", q: "低年級雙語課是哪個領域?", a: ["(A) 雙語生活", "(B) 雙語綜合"], ans: 0 },
            6: { name: "We love English Day!", q: "每週的英語日是哪一天呢？", a: ["(A) Monday", "(B) Tuesday"], ans: 1 },
            7: { name: "Xiude吉祥物", q: "請問在修德最常見的動物是什麼？", a: ["(A) 松鼠", "(B) 天竺鼠"], ans: 0 },
            8: { name: "Happy Mother’s Day!", q: "數一數，整個圖書館裡有幾朵康乃馨呢？", a: ["(A) 三朵", "(B) 六朵"], ans: 1 },
            9: { name: "Hi! 修德 Boss!", q: "請問本校校長是幾號照片？", a: ["(A) 一號", "(B) 二號"], ans: 1 },
            10: { name: "球拍大考驗", q: "請問大部分的桌球拍拍面是哪兩種顏色的呢？", a: ["(A) 黑色、紅色", "(B) 白色、粉色"], ans: 0 },
            11: { name: "Soccer選一選！", q: "請問足球是用身體哪一個部位的運動?", a: ["(A) 手", "(B) 腳"], ans: 1 }
        };

        // 持久化存檔
        let state = JSON.parse(localStorage.getItem('xiude_60th_state')) || { user: null, done: [], failed: [], hasSubmitted: false };

        function save() { localStorage.setItem('xiude_60th_state', JSON.stringify(state)); }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i = 1; i <= 11; i++) {
                let statusClass = 'bg-white text-slate-400 border-gray-100';
                if(state.done.includes(i)) statusClass = 'completed shadow-md shadow-emerald-100';
                else if(state.failed.includes(i)) statusClass = 'failed shadow-md shadow-red-100';
                
                grid.innerHTML += `
                    <div class="p-4 ${statusClass} rounded-2xl border-2 text-center flex flex-col justify-center items-center min-h-[100px] no-click transition-all">
                        <span class="text-[9px] font-bold uppercase opacity-60">Stage ${i}</span>
                        <span class="font-extrabold text-[13px] mt-1 leading-tight text-slate-700">${STAGE_DATA[i].name}</span>
                    </div>`;
            }
            const count = state.done.length;
            document.getElementById('progress').innerText = `完成進度 ${count} / 11`;
            if(count >= 3) document.getElementById('reward-3').classList.add('reward-active');
            if(count >= 7) document.getElementById('reward-7').classList.add('reward-active');
            if(count >= 11) document.getElementById('reward-11').classList.add('reward-active');
        }

        // 語音朗讀功能 (加入安全檢查)
        function playAudio(id) {
            if (!('speechSynthesis' in window)) {
                return alert("您目前使用的瀏覽器不支援語音朗讀功能喔！建議使用 Chrome 或 Safari 開啟。");
            }
            
            // 先停止可能正在播放的聲音，避免重疊
            window.speechSynthesis.cancel(); 
            
            const stage = STAGE_DATA[id];
            let textToRead = `第 ${id} 關。${stage.name}。${stage.q} `;
            stage.a.forEach((opt) => {
                textToRead += `。${opt}`;
            });

            const utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.lang = 'zh-TW'; 
            utterance.rate = 0.85;    
            window.speechSynthesis.speak(utterance);
        }

        function openQuiz(id) {
            const sId = parseInt(id);
            if(state.done.includes(sId)) return;
            if(state.failed.includes(sId)) return alert("此關卡回答錯誤已被鎖定。");
            
            document.getElementById('quiz-modal').classList.remove('hidden');
            document.getElementById('quiz-header').innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <p class="text-indigo-600 font-bold text-sm uppercase tracking-widest mt-1">挑戰開始 · 第 ${id} 關</p>
                    <button onclick="playAudio(${id})" class="bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-full text-xs font-bold shadow-sm active:scale-95 transition-all flex items-center gap-1 hover:bg-indigo-200">
                        🔊 唸題目
                    </button>
                </div>
                <h3 class="text-gray-400 text-xs font-medium mb-3">${STAGE_DATA[id].name}</h3>
                <h2 class="text-xl font-black text-slate-800 leading-snug">${STAGE_DATA[id].q}</h2>
            `;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            STAGE_DATA[id].a.forEach((txt, i) => {
                optDiv.innerHTML += `
                    <button onclick="check(${id}, ${i})" class="w-full p-5 border-2 border-slate-100 rounded-2xl hover:border-indigo-500 hover:bg-indigo-50 text-left font-bold text-slate-700 transition-all active:scale-[0.98]">
                        ${txt}
                    </button>`;
            });
        }

        // 將資料傳送到 Google Sheets
        function sendDataToGoogleSheet() {
            if (state.hasSubmitted) return; 
            
            const GAS_URL = "https://script.google.com/macros/s/AKfycbzbtfyfatz7lfQ4_AS2RLquv2pJhhUNB5aPiJlIbLyfHzM3uzRl1gMU6gcnmnsKnhln8A/exec";
            
            const payload = {
                cls: state.user.cls,
                no: state.user.no,
                doneCount: state.done.length
            };

            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            }).then(() => {
                state.hasSubmitted = true;
                save();
                alert("🎊 恭喜！您已達成 9 關，資料已自動登錄抽獎名單！");
            }).catch(err => console.error("傳送失敗：", err));
        }

        function check(id, selected) {
            // 安全停止語音：先檢查瀏覽器是否支援，避免當機
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }

            if(selected === STAGE_DATA[id].ans) {
                if(!state.done.includes(id)) state.done.push(id);
                // 為了避免 alert 被擋住，先存檔再跳提示
                save(); 
                alert("答對了！恭喜完成！");
                
                const count = state.done.length;
                
                // 滿 9 關自動登記抽獎
                if(count === 9) {
                    sendDataToGoogleSheet();
                }
                
                if(count === 3) alert("🎉 恭喜！已達成 3 關，請至兌獎處領取「小獎」！");
                if(count === 7) alert("🎊 太厲害了！已達成 7 關，獲得「中級獎」領取資格！");
                if(count === 11) alert("👑 傳奇誕生！你已完成所有挑戰，快去領取「終極大獎」！");
            } else {
                if(!state.failed.includes(id)) state.failed.push(id);
                save();
                alert("答案錯誤，本關卡已鎖定。");
            }
            
            closeModal();
            renderGrid();
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // 登出與重設進度功能
        function logout() {
            if(confirm("重設進度將清空所有已過關紀錄，確定要換人闖關或重來嗎？")) {
                localStorage.removeItem('xiude_60th_state');
                // 導向根目錄，避免網址殘留參數
                location.href = window.location.pathname;
            }
        }

        function closeModal() { 
            // 離開題目視窗時，安全停止語音播放
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
            document.getElementById('quiz-modal').classList.add('hidden'); 
        }

        function showGame() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('user-display').innerText = `${state.user.cls} 班 ${state.user.no} 號`;
            renderGrid();
            
            // 加密網址對照表
            const SECRET_MAP = {
                "aX7k": 1, "mP2q": 2, "vN9d": 3, "bR4w": 4, "tC8f": 5,
                "hY5j": 6, "eZ3s": 7, "kL6m": 8, "pW1v": 9, "dG8n": 10, "qF4b": 11
            };
            const s = new URLSearchParams(window.location.search).get('stage');
            const realStage = SECRET_MAP[s];
            
            if(realStage && STAGE_DATA[realStage]) {
                setTimeout(() => openQuiz(realStage), 500);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(state.user) showGame();
            document.getElementById('login-btn').addEventListener('click', () => {
                const cls = document.getElementById('class-input').value.trim();
                const no = document.getElementById('no-input').value.trim();
                if(!cls || !no) return alert("請輸入班級與座號");
                state.user = { cls, no };
                save();
                showGame();
            });
        });
    </script>
</body>
</html>
