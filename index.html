<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校慶闖關系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="login-view" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10">
        <h1 class="text-2xl font-bold text-center mb-6">校慶闖關登入</h1>
        <input type="text" id="class-input" placeholder="班級" class="w-full p-3 border rounded-xl mb-4">
        <input type="text" id="no-input" placeholder="座號" class="w-full p-3 border rounded-xl mb-6">
        <button id="login-btn" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold">開始闖關</button>
    </div>

    <div id="game-view" class="hidden max-w-2xl mx-auto p-4">
        <div class="bg-white p-4 rounded-xl shadow mb-6 text-center">
            <h2 id="user-display" class="font-bold text-lg"></h2>
        </div>
        <div id="grid" class="grid grid-cols-3 gap-4"></div>
    </div>

    <div id="quiz-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-lg">
            <h2 id="quiz-title" class="text-xl font-bold mb-4"></h2>
            <div id="options" class="space-y-3"></div>
        </div>
    </div>

    <script>
        // 1. 資料庫
        const STAGE_DATA = {
            1: { q: "校慶題目1", a: ["A", "B", "C", "D"], ans: 0 },
            2: { q: "校慶題目2", a: ["A", "B", "C", "D"], ans: 0 }
            // 你可以在此繼續填寫 3 到 11 關
        };

        let state = { done: [], failed: [] };

        // 2. 定義功能函數 (全部放在最外層)
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i = 1; i <= 11; i++) {
                grid.innerHTML += `<div class="p-6 bg-white rounded-xl shadow text-center font-bold">第 ${i} 關</div>`;
            }
        }

        function openQuiz(id) {
            document.getElementById('quiz-modal').classList.remove('hidden');
            document.getElementById('quiz-title').innerText = "第 " + id + " 關";
            // 這裡可以加入選項渲染邏輯
        }

        // 3. 確保頁面載入後再綁定事件
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('login-btn').addEventListener('click', () => {
                const cls = document.getElementById('class-input').value;
                const no = document.getElementById('no-input').value;
                
                if(!cls || !no) return alert("請輸入班級與座號");

                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('game-view').classList.remove('hidden');
                document.getElementById('user-display').innerText = cls + "班 " + no + "號";
                
                renderGrid(); // 此時 renderGrid 一定已被定義，不會再報錯
            });
        });
    </script>
</body>
</html>
