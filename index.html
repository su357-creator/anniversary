<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修德 60 周年校慶闖關</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .completed { background-color: #10b981 !important; color: white !important; }
        .failed { background-color: #ef4444 !important; color: white !important; }
        .reward-active { color: #f59e0b !important; transform: scale(1.1); font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div id="login-view" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10">
        <h1 class="text-2xl font-bold text-center mb-2">校慶闖關登入</h1>
        <p class="text-center text-gray-500 mb-6 text-sm">歡迎來到修德 60 周年慶典</p>
        <input type="text" id="class-input" placeholder="請輸入班級" class="w-full p-3 border rounded-xl mb-4">
        <input type="text" id="no-input" placeholder="請輸入座號" class="w-full p-3 border rounded-xl mb-6">
        <button id="login-btn" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold">開始闖關</button>
    </div>

    <div id="game-view" class="hidden max-w-2xl mx-auto">
        <div class="bg-white p-4 rounded-xl shadow mb-6 text-center relative">
            <h2 id="user-display" class="font-bold text-lg mb-2"></h2>
            
            <div class="flex justify-around items-center bg-gray-50 p-3 rounded-lg border border-dashed border-gray-300 mb-4">
                <div id="reward-3" class="text-gray-400 text-sm">🥉 3關: 小獎</div>
                <div id="reward-7" class="text-gray-400 text-sm">🥈 7關: 中級獎</div>
                <div id="reward-11" class="text-gray-400 text-sm">🏆 11關: 大獎</div>
            </div>

            <p id="progress" class="text-indigo-600 font-bold">完成 0 / 11 關</p>
            <button onclick="logout()" class="absolute top-2 right-2 text-xs text-gray-400 underline">登出/重設</button>
        </div>
        <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </div>

    <div id="quiz-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl w-full max-w-lg">
            <h2 id="quiz-title" class="text-xl font-bold mb-4"></h2>
            <div id="options" class="space-y-3"></div>
            <button onclick="closeModal()" class="mt-4 w-full text-gray-400 text-sm italic underline text-center">暫時關閉</button>
        </div>
    </div>

    <script>
        const STAGE_DATA = {
            1: { name: "藝海尋蹤・樓層大解密", q: "歡迎來到修德藝術殿堂！請觀察一下，這間位於龍鳳樓五樓的美術教室，真正的名稱是什麼呢？", a: ["(A) 龍飛鳳舞", "(B) 修德 Art Center"], ans: 1 },
            2: { name: "藝想天開・策展小達人", q: "進入展區欣賞精美作品時，別忘了抬頭看看門口或牆上的大海報，請問今年美術班展覽的主題名稱是？", a: ["(A) 時空藝象", "(B) 藝於常人"], ans: 0 },
            3: { name: "繽紛甲子・校園調色盤", q: "修德慶祝 60 周年啦！請環顧一下校園四周的慶典布置，這六十周年的主色系是由哪四色構成的呢？", a: ["(A) 紅、黃、藍、綠", "(B) 灰、黑、白、粉"], ans: 0 },
            4: { name: "How old is Xiude?", q: "今年是修德實施雙語教學的第幾年呢?", a: ["(A) 第6年", "(B) 第16年"], ans: 0 },
            5: { name: "I love Bilingual!", q: "低年級雙語課是哪個領域?", a: ["(A) 雙語生活", "(B) 雙語綜合"], ans: 0 },
            6: { name: "We love English Day!", q: "每週的英語日是哪一天呢？", a: ["(A) Monday", "(B) Tuesday"], ans: 1 },
            7: { name: "Xiude吉祥物", q: "請問在修德最常見的動物是什麼？", a: ["(A) 松鼠", "(B) 天竺鼠"], ans: 0 },
            8: { name: "Happy Mother’s Day!", q: "數一數，整個圖書館裡有幾朵康乃馨呢？", a: ["(A) 三朵", "(B) 六朵"], ans: 1 },
            9: { name: "Hi! 修德 Boss!", q: "請問本校校長是幾號照片？", a: ["(A) 一號", "(B) 二號"], ans: 1 },
            10: { name: "球拍大考驗", q: "請問大部分的桌球拍拍面是哪兩種顏色的呢？", a: ["(A) 黑色、紅色", "(B) 白色、粉色"], ans: 0 },
            11: { name: "Soccer選一選！", q: "請問足球是用身體哪一個部位的運動?", a: ["(A) 手", "(B) 腳"], ans: 1 }
        };

        let state = JSON.parse(localStorage.getItem('quiz_state')) || { user: null, done: [], failed: [] };

        function saveState() {
            localStorage.setItem('quiz_state', JSON.stringify(state));
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i = 1; i <= 11; i++) {
                let css = 'bg-white text-gray-800';
                if(state.done.includes(i)) css = 'completed';
                else if(state.failed.includes(i)) css = 'failed';
                
                grid.innerHTML += `
                    <div class="p-3 ${css} rounded-xl shadow text-center flex flex-col justify-center items-center min-h-[90px] cursor-pointer" onclick="openQuiz(${i})">
                        <span class="text-[10px] opacity-70 uppercase tracking-tighter">Stage ${i}</span>
                        <span class="font-bold text-xs mt-1 leading-tight">${STAGE_DATA[i].name}</span>
                    </div>`;
            }
            
            const count = state.done.length;
            document.getElementById('progress').innerText = `完成 ${count} / 11 關`;
            
            if(count >= 3) document.getElementById('reward-3').className = 'reward-active text-amber-600';
            if(count >= 7) document.getElementById('reward-7').className = 'reward-active text-slate-500';
            if(count >= 11) document.getElementById('reward-11').className = 'reward-active text-yellow-500';
        }

        function openQuiz(id) {
            const sId = parseInt(id);
            if(state.done.includes(sId)) return alert("這關已經通過囉！");
            if(state.failed.includes(sId)) return alert("很遺憾，這關已失敗鎖定。");
            document.getElementById('quiz-modal').classList.remove('hidden');
            
            document.getElementById('quiz-title').innerHTML = `
                <span class="text-indigo-600 text-xs block mb-1 font-mono">STEP ${id}: ${STAGE_DATA[id].name}</span>
                <span class="text-lg">${STAGE_DATA[id].q}</span>
            `;
            
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            STAGE_DATA[id].a.forEach((txt, i) => {
                optDiv.innerHTML += `<button onclick="check(${id}, ${i})" class="w-full p-4 border-2 rounded-xl hover:bg-indigo-50 text-left transition-all font-medium active:scale-95">${txt}</button>`;
            });
        }

        function check(id, selected) {
            if(selected === STAGE_DATA[id].ans) {
                state.done.push(parseInt(id));
                alert("答對了！恭喜！");
                const currentCount = state.done.length;
                if(currentCount === 3) alert("🎉 恭喜達成 3 關！可以領取「小獎」囉！");
                if(currentCount === 7) alert("🎊 厲害！達成 7 關，獲得「中級獎」兌換資格！");
                if(currentCount === 11) alert("👑 完美通關！你是修德闖關王，領取「大獎」吧！");
            } else {
                state.failed.push(parseInt(id));
                alert("答案錯誤，關卡已被鎖定囉！");
            }
            saveState();
            document.getElementById('quiz-modal').classList.add('hidden');
            renderGrid();
        }

        function logout() {
            if(confirm("確定要重設紀錄嗎？（清除後將清空所有進度）")) {
                localStorage.removeItem('quiz_state');
                location.reload();
            }
        }

        function closeModal() {
            document.getElementById('quiz-modal').classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(state.user) showGame();
            document.getElementById('login-btn').addEventListener('click', () => {
                const cls = document.getElementById('class-input').value;
                const no = document.getElementById('no-input').value;
                if(!cls || !no) return alert("請輸入班級與座號");
                state.user = { cls, no };
                saveState();
                showGame();
            });
        });

        function showGame() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('user-display').innerText = `${state.user.cls}班 ${state.user.no}號`;
            renderGrid();
            const s = new URLSearchParams(window.location.search).get('stage');
            if(s && STAGE_DATA[s]) setTimeout(() => openQuiz(s), 500);
        }
    </script>
</body>
</html>
