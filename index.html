<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>校慶闖關系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="login-view" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10">
        <h1 class="text-2xl font-bold text-center mb-6">校慶闖關登入</h1>
        <input type="text" id="class-input" placeholder="班級" class="w-full p-3 border rounded-xl mb-4">
        <input type="text" id="no-input" placeholder="座號" class="w-full p-3 border rounded-xl mb-6">
        <button onclick="login()" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold">開始闖關</button>
    </div>

    <div id="game-view" class="hidden max-w-2xl mx-auto p-4">
        <div class="bg-white p-4 rounded-xl shadow mb-6">
            <h2 id="user-display" class="font-bold text-lg"></h2>
        </div>
        <div id="grid" class="grid grid-cols-3 gap-4"></div>
    </div>

    <script>
        // 確認 login 函數被正確定義
        function login() {
            console.log("登入按鈕被點擊了");
            const cls = document.getElementById('class-input').value;
            const no = document.getElementById('no-input').value;
            
            if (!cls || !no) {
                alert("請輸入班級與座號！");
                return;
            }

            // 隱藏登入頁，顯示遊戲頁
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            
            document.getElementById('user-display').innerText = cls + " 班 " + no + " 號";
            
            // 初始化格子
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i = 1; i <= 11; i++) {
                grid.innerHTML += `<div class="p-6 bg-white rounded-xl shadow text-center font-bold">第 ${i} 關</div>`;
            }
        }
    </script>
</body>
</html>
