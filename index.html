<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校慶闖關系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .completed { background-color: #10b981 !important; color: white !important; }
        .failed { background-color: #ef4444 !important; color: white !important; }
        .reward-active { color: #f59e0b !important; transform: scale(1.1); font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div id="login-view" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10">
        <h1 class="text-2xl font-bold text-center mb-6">校慶闖關登入</h1>
        <input type="text" id="class-input" placeholder="班級" class="w-full p-3 border rounded-xl mb-4">
        <input type="text" id="no-input" placeholder="座號" class="w-full p-3 border rounded-xl mb-6">
        <button id="login-btn" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold">開始闖關</button>
    </div>

    <div id="game-view" class="hidden max-w-2xl mx-auto">
        <div class="bg-white p-4 rounded-xl shadow mb-6 text-center relative">
            <h2 id="user-display" class="font-bold text-lg mb-2"></h2>
            
            <div class="flex justify-around items-center bg-gray-50 p-3 rounded-lg border border-dashed border-gray-300 mb-4">
                <div id="reward-3" class="text-gray-400 text-sm">🥉 3關: 小獎</div>
                <div id="reward-7" class="text-gray-400 text-sm">🥈 7關: 中級獎</div>
                <div id="reward-11" class="text-gray-400 text-sm">🏆 11關: 大獎</div>
            </div>

            <p id="progress" class="text-indigo-600 font-bold">完成 0 / 11 關</p>
            <button onclick="logout()" class="absolute top-2 right-2 text-xs text-gray-400 underline">登出/重設</button>
        </div>
        <div id="grid" class="grid grid-cols-3 md:grid-cols-4 gap-4"></div>
    </div>

    <div id="quiz-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl w-full max-w-lg">
            <h2 id="quiz-title" class="text-xl font-bold mb-4"></h2>
            <div id="options" class="space-y-3"></div>
            <button onclick="closeModal()" class="mt-4 w-full text-gray-400 text-sm italic">暫時關閉</button>
        </div>
    </div>

    <script>
        const STAGE_DATA = {
            1: { q: "校慶慶祝的是學校幾週年？", a: ["20週年", "30週年", "40週年", "50週年"], ans: 2 },
            2: { q: "學校的主色調是什麼？", a: ["紅色", "藍色", "綠色", "黃色"], ans: 1 },
            3: { q: "圖書館位於哪一棟？", a: ["A棟", "B棟", "C棟", "D棟"], ans: 0 },
            4: { q: "校慶在哪個月舉辦？", a: ["1月", "5月", "10月", "12月"], ans: 2 },
            5: { q: "校門口有幾棵樹？", a: ["2棵", "3棵", "4棵", "不知"], ans: 0 },
            6: { q: "校歌第一句是什麼？", a: ["我們是好學生", "美麗的校園", "山川壯麗", "自由翱翔"], ans: 1 },
            7: { q: "第七關題目內容", a: ["選項A", "選項B", "選項C", "選項D"], ans: 0 },
            8: { q: "第八關題目內容", a: ["選項A", "選項B", "選項C", "選項D"], ans: 0 },
            9: { q: "第九關題目內容", a: ["選項A", "選項B", "選項C", "選項D"], ans: 0 },
            10: { q: "第十關題目內容", a: ["選項A", "選項B", "選項C", "選項D"], ans: 0 },
            11: { q: "第十一關題目內容", a: ["選項A", "選項B", "選項C", "選項D"], ans: 0 }
        };

        let state = JSON.parse(localStorage.getItem('quiz_state')) || { user: null, done: [], failed: [] };

        function saveState() {
            localStorage.setItem('quiz_state', JSON.stringify(state));
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i = 1; i <= 11; i++) {
                let css = 'bg-white';
                if(state.done.includes(i)) css = 'completed';
                else if(state.failed.includes(i)) css = 'failed';
                grid.innerHTML += `<div class="p-6 ${css} rounded-xl shadow text-center font-bold">第 ${i} 關</div>`;
            }
            
            const count = state.done.length;
            document.getElementById('progress').innerText = `完成 ${count} / 11 關`;
            
            // 更新獎勵圖示狀態
            if(count >= 3) document.getElementById('reward-3').className = 'reward-active';
            if(count >= 7) document.getElementById('reward-7').className = 'reward-active';
            if(count >= 11) document.getElementById('reward-11').className = 'reward-active';
        }

        function openQuiz(id) {
            const sId = parseInt(id);
            if(state.done.includes(sId)) return alert("這關已經過囉！");
            if(state.failed.includes(sId)) return alert("這關已失敗鎖定。");
            document.getElementById('quiz-modal').classList.remove('hidden');
            document.getElementById('quiz-title').innerText = `第 ${id} 關：${STAGE_DATA[id].q}`;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            STAGE_DATA[id].a.forEach((txt, i) => {
                optDiv.innerHTML += `<button onclick="check(${id}, ${i})" class="w-full p-3 border rounded-xl hover:bg-gray-100">${txt}</button>`;
            });
        }

        function check(id, selected) {
            if(selected === STAGE_DATA[id].ans) {
                state.done.push(parseInt(id));
                alert("答對了！");
                
                // 檢查獎勵彈窗
                const currentCount = state.done.length;
                if(currentCount === 3) alert("🎉 恭喜！你已達成 3 關，可以領取「小獎」囉！");
                if(currentCount === 7) alert("🎊 太強了！已達成 7 關，獲得「中級獎」兌換資格！");
                if(currentCount === 11) alert("👑 全員全過！你是闖關王，領取「終極大獎」吧！");
                
            } else {
                state.failed.push(parseInt(id));
                alert("答案錯誤，關卡已被鎖定！");
            }
            saveState();
            document.getElementById('quiz-modal').classList.add('hidden');
            renderGrid();
        }

        function logout() {
            if(confirm("確定要登出並重設所有紀錄嗎？")) {
                localStorage.removeItem('quiz_state');
                location.reload();
            }
        }

        function closeModal() {
            document.getElementById('quiz-modal').classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(state.user) {
                showGame();
            }
            document.getElementById('login-btn').addEventListener('click', () => {
                const cls = document.getElementById('class-input').value;
                const no = document.getElementById('no-input').value;
                if(!cls || !no) return alert("請輸入班級座號");
                state.user = { cls, no };
                saveState();
                showGame();
            });
        });

        function showGame() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('user-display').innerText = `${state.user.cls}班 ${state.user.no}號`;
            renderGrid();
            const s = new URLSearchParams(window.location.search).get('stage');
            if(s && STAGE_DATA[s]) setTimeout(() => openQuiz(s), 500);
        }
    </script>
</body>
</html>
